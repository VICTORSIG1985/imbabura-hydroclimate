name: Build & Deploy to GitHub Pages

# IMPORTANTE: Workflow desactivado para builds automáticos.
# Solo se ejecuta cuando se dispara MANUALMENTE desde GitHub Actions UI.
# Razón: el repo público no contiene los datos científicos (están en respaldo local
# del autor). Para hacer un nuevo deploy hay que restaurar los datos en public/
# antes de ejecutar el workflow manualmente.

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production
      - name: Create root redirect /es/ + 404 fallback (with OG metadata for social sharing)
        run: |
          cat > out/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Geoportal Hidroclimático de Imbabura · 1981–2070</title>
            <meta name="description" content="Geoportal científico de tendencias hidroclimáticas, teleconexión El Niño y proyecciones CMIP6 para la provincia de Imbabura, Ecuador.">
            <meta property="og:type" content="website">
            <meta property="og:title" content="Geoportal Hidroclimático de Imbabura">
            <meta property="og:description" content="Tendencias 1981–2025 · ENSO · Proyecciones CMIP6.">
            <meta property="og:url" content="https://victorsig1985.github.io/imbabura-hydroclimate/">
            <meta property="og:image" content="https://victorsig1985.github.io/imbabura-hydroclimate/og-image.jpg">
            <link rel="canonical" href="./es/">
            <meta http-equiv="refresh" content="0; url=./es/">
            <script>location.replace('./es/');</script>
          </head>
          <body><p>Redirigiendo…</p></body>
          </html>
          HTML
          cp out/index.html out/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
