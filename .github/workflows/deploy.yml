name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NODE_ENV: production
      - name: Create root redirect /es/ + 404 fallback
        run: |
          cat > out/index.html <<'HTML'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <title>Geoportal Hidroclimático de Imbabura</title>
            <meta http-equiv="refresh" content="0; url=./es/">
            <link rel="canonical" href="./es/">
            <script>location.replace('./es/');</script>
          </head>
          <body>
            <p>Redirigiendo a <a href="./es/">/es/</a> · Redirecting to <a href="./en/">/en/</a></p>
          </body>
          </html>
          HTML
          # Copy 404 to handle locale-less paths
          cp out/index.html out/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
